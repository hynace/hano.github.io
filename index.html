<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My GitHub.io Home</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>나의 개인 홈페이지</h1>
        <p class="tagline">GitHub Pages 기반 블로그 / 게시판</p>
      </div>
    </header>

    <main class="container grid-layout">
      <section class="card">
        <h2>게시판 바로가기</h2>
        <div id="board-links" class="board-links"></div>
      </section>

      <section class="card">
        <h2>메인 최신 글</h2>
        <ul id="recent-posts" class="post-list"></ul>
      </section>

      <section class="card full-width">
        <h2>소개</h2>
        <p>
          이 페이지는 정적 파일만으로 구성되어 GitHub Pages에서 바로 동작합니다.
          게시판별 글 목록과 메인 최신 글은 동일한 데이터 파일을 읽어 자동 반영됩니다.
        </p>
      </section>
    </main>

    <script src="assets/app.js"></script>
    <script>
      window.BlogUI.renderHome();
    </script>
  </body>
</html>
