{{ $current := .RelPermalink }}
<header class="site-header">
  <div class="container site-header__inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}">
      <span class="brand__dot"></span>
      <span class="brand__text">{{ site.Data.site.brand }}</span>
    </a>

    <nav class="site-nav" aria-label="Primary navigation">
      {{ range site.Menus.main }}
        {{ $itemURL := .URL | relURL }}
        {{ $isHome := eq .Identifier "home" }}
        {{ $active := cond $isHome (eq $current $itemURL) (or (eq $current $itemURL) (hasPrefix $current $itemURL)) }}
        <a class="site-nav__link{{ if $active }} is-active{{ end }}" href="{{ $itemURL }}">
          {{ .Name }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
