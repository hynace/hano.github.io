<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {{ if .IsHome }}
        {{ site.Title }}
      {{ else }}
        {{ .Title }} | {{ site.Title }}
      {{ end }}
    </title>
    <meta name="description" content="{{ .Description | default site.Params.description }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}" />
  </head>
  <body class="page page--{{ if .IsHome }}home{{ else }}{{ .Section | default .Kind }}{{ end }}">
    {{ partial "header.html" . }}
    <main class="page-main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </body>
</html>
